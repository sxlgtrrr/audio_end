<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>语音情感感知智能助手</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f0f1a; --surface: #1a1a2e; --surface2: #222240;
    --text: #e0e0e0; --muted: #7777aa; --accent: #e94560;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI','Microsoft YaHei',sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; display: flex; overflow: hidden;
  }

  /* === 侧边栏 === */
  .sidebar {
    width: 300px; background: var(--surface);
    border-right: 1px solid rgba(255,255,255,0.06);
    display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
  }
  .sidebar-header {
    padding: 18px 16px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .sidebar-header h2 {
    font-size: 16px; font-weight: 700;
    background: linear-gradient(135deg, #e94560, #f39c12);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .sidebar-header p { font-size: 10px; color: var(--muted); margin-top: 3px; }

  .sidebar-section {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .sidebar-section h3 {
    font-size: 10px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 8px;
  }

  .chart-box { height: 120px; }
  .chart-box canvas { width: 100% !important; height: 100% !important; }

  .speaker-list { max-height: 200px; overflow-y: auto; }
  .speaker-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; border-radius: 8px;
    margin-bottom: 3px; font-size: 12px; justify-content: space-between;
  }
  .speaker-item:hover { background: rgba(255,255,255,0.04); }
  .speaker-item .s-name { font-weight: 600; }
  .speaker-item .s-stats { color: var(--muted); font-size: 10px; }
  .speaker-item .s-del {
    cursor: pointer; font-size: 14px; opacity: 0.4; padding: 2px 6px;
  }
  .speaker-item .s-del:hover { opacity: 1; color: var(--accent); }
  .speaker-item.current {
    border: 1px solid rgba(233,69,96,0.3);
    background: rgba(233,69,96,0.08);
  }

  .speaker-register {
    margin-top: 8px; display: flex; gap: 6px;
  }
  .speaker-register input {
    flex: 1; padding: 6px 10px; border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px; background: rgba(0,0,0,0.3); color: var(--text);
    font-size: 12px; outline: none;
  }
  .speaker-register input:focus { border-color: var(--accent); }
  .speaker-register button {
    padding: 6px 14px; border: none; border-radius: 6px;
    background: var(--accent); color: white; font-size: 12px;
    cursor: pointer; white-space: nowrap;
  }
  .speaker-register button:disabled { opacity: 0.5; cursor: not-allowed; }
  .register-hint { font-size: 10px; color: var(--muted); margin-top: 4px; }

  /* === 主区域 === */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  .topbar {
    padding: 12px 20px; background: var(--surface);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar h1 { font-size: 16px; font-weight: 600; }
  .topbar .controls { display: flex; gap: 6px; align-items: center; }
  .toggle-group {
    display: flex; background: var(--surface2); border-radius: 7px; padding: 2px;
  }
  .toggle-btn {
    padding: 4px 10px; border: none; background: transparent;
    color: var(--muted); font-size: 10px; cursor: pointer;
    border-radius: 5px; transition: all 0.2s;
  }
  .toggle-btn.active { background: var(--accent); color: white; }

  /* 聊天区 */
  .chat { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }

  .msg { display: flex; gap: 8px; max-width: 82%; animation: slideIn 0.3s ease; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }
  @keyframes slideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .msg-avatar {
    width: 30px; height: 30px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0;
  }
  .msg.user .msg-avatar { background: rgba(233,69,96,0.2); }
  .msg.assistant .msg-avatar { background: rgba(52,152,219,0.2); }

  .msg-content {
    padding: 8px 12px; border-radius: 12px; line-height: 1.5; font-size: 12px;
    position: relative;
  }
  .msg.user .msg-content {
    background: linear-gradient(135deg, var(--accent), #c0392b);
    border-bottom-right-radius: 3px;
  }
  .msg.assistant .msg-content {
    background: var(--surface2);
    border-bottom-left-radius: 3px;
  }
  .emotion-tag {
    display: inline-block; padding: 1px 6px; border-radius: 4px;
    font-size: 10px; font-weight: 600; margin-right: 3px;
  }
  .conf-badge { font-size: 9px; color: rgba(255,255,255,0.5); }
  .speaker-tag {
    display: inline-block; padding: 1px 6px; border-radius: 4px;
    font-size: 9px; font-weight: 600; background: rgba(52,152,219,0.15);
    color: #3498db; border: 1px solid rgba(52,152,219,0.3); margin-right: 3px;
  }
  .msg-actions { display: flex; gap: 4px; margin-top: 4px; }
  .act-btn {
    padding: 2px 8px; border-radius: 4px; font-size: 10px; cursor: pointer;
    background: rgba(255,255,255,0.06); color: var(--muted);
    border: none; transition: all 0.2s;
  }
  .act-btn:hover { background: rgba(255,255,255,0.12); color: white; }

  /* 频谱图 */
  .spectrogram-box {
    margin: 4px 0; width: 100%; height: 60px; border-radius: 8px;
    background: rgba(0,0,0,0.3); display: none; overflow: hidden;
  }
  .spectrogram-box.active { display: block; }
  .spectrogram-box canvas { width: 100%; height: 100%; }

  /* 录音区 */
  .recorder {
    padding: 12px 20px 16px; background: var(--surface);
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .waveform-canvas {
    width: 100%; height: 36px; border-radius: 8px;
    background: rgba(255,255,255,0.03); display: none;
  }
  .waveform-canvas.active { display: block; }
  .rec-btn {
    width: 42px; height: 42px; border-radius: 50%; border: none;
    background: var(--accent); color: white; font-size: 20px;
    cursor: pointer; transition: all 0.3s; display: flex;
    align-items: center; justify-content: center;
    box-shadow: 0 3px 14px rgba(233,69,96,0.3);
  }
  .rec-btn:hover { transform: scale(1.06); }
  .rec-btn.recording {
    background: #ff0000; animation: recPulse 1.5s infinite;
  }
  @keyframes recPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,0,0,0.5); }
    50% { box-shadow: 0 0 0 14px rgba(255,0,0,0); }
  }
  .rec-hint { font-size: 10px; color: var(--muted); }
  .rec-timer { font-size: 14px; font-weight: 600; color: var(--accent); display: none; }
  .rec-timer.show { display: block; }

  .analyzing {
    display: none; align-items: center; gap: 6px;
    padding: 6px 12px; background: rgba(233,69,96,0.1);
    border-radius: 8px; font-size: 11px;
  }
  .analyzing.show { display: flex; }
  .dot-spinner { display: flex; gap: 2px; }
  .dot-spinner span {
    width: 4px; height: 4px; background: var(--accent); border-radius: 50%;
    animation: dotBounce 1.2s infinite;
  }
  .dot-spinner span:nth-child(2) { animation-delay: 0.2s; }
  .dot-spinner span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotBounce {
    0%,80%,100% { transform: scale(0.4); opacity: 0.2; }
    40% { transform: scale(1); opacity: 1; }
  }

  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px; color: var(--muted);
  }
  .empty-state .big-icon { font-size: 48px; opacity: 0.35; }
  .empty-state p { font-size: 14px; }
  .empty-state .sub { font-size: 11px; opacity: 0.5; }

  /* 上传区 */
  .upload-zone {
    margin-top: 6px; padding: 12px;
    border: 2px dashed rgba(255,255,255,0.08);
    border-radius: 10px; text-align: center; cursor: pointer;
    transition: all 0.2s; font-size: 11px; color: var(--muted);
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent); background: rgba(233,69,96,0.04); color: var(--text);
  }
  .upload-zone input { display: none; }
</style>
</head>
<body>
<!-- 侧边栏 -->
<aside class="sidebar">
  <div class="sidebar-header">
    <h2>🎙 情感感知智能助手</h2>
    <p>Wav2Vec2 · Whisper · MFCC+GMM | 语音课设</p>
  </div>

  <div class="sidebar-section">
    <h3>📊 情感趋势</h3>
    <div class="chart-box"><canvas id="emotionChart"></canvas></div>
  </div>

  <div class="sidebar-section">
    <h3>👥 说话人</h3>
    <div class="speaker-list" id="speakerList">
      <div style="text-align:center;color:var(--muted);padding:12px;font-size:10px;">暂无注册说话人<br>输入名字并录音注册</div>
    </div>
    <div class="speaker-register">
      <input type="text" id="speakerName" placeholder="输入你的名字" maxlength="20">
      <button id="registerBtn" onclick="registerSpeaker()">注册</button>
    </div>
    <div class="register-hint">注册说话人后，我会记住你是谁<br>并个性化回复</div>
  </div>

  <div class="sidebar-section">
    <h3>📁 上传音频</h3>
    <div class="upload-zone" id="uploadZone"
      onclick="document.getElementById('fileInput').click()"
      ondragover="event.preventDefault();this.classList.add('dragover')"
      ondragleave="this.classList.remove('dragover')"
      ondrop="event.preventDefault();this.classList.remove('dragover');handleFileDrop(event)">
      📁 点击或拖拽 .wav / .mp3 文件
      <input type="file" id="fileInput" accept=".wav,.mp3" onchange="handleFileSelect(event)">
    </div>
  </div>
</aside>

<!-- 主区域 -->
<main class="main">
  <div class="topbar">
    <h1>💬 多模态语音交互</h1>
    <div class="controls">
      <div class="toggle-group">
        <button class="toggle-btn active" id="modeRecord" onclick="setMode('record')">🎤 录音</button>
        <button class="toggle-btn" id="modeUpload" onclick="setMode('upload')">📁 上传</button>
      </div>
    </div>
  </div>

  <div class="chat" id="chatArea">
    <div class="empty-state" id="emptyState">
      <div class="big-icon">🎤</div>
      <p>开始多模态语音对话</p>
      <p class="sub">录音或上传音频 · 我会识别你是谁、你的情感、你说的话</p>
    </div>
  </div>

  <div class="spectrogram-box" id="spectroBox">
    <canvas id="spectroCanvas"></canvas>
  </div>

  <div class="recorder">
    <canvas class="waveform-canvas" id="waveform" width="600" height="36"></canvas>
    <div class="rec-timer" id="recTimer">00:00</div>
    <button class="rec-btn" id="recBtn" onclick="toggleRecord()" title="点击开始/停止录音">🎤</button>
    <div class="rec-hint" id="recHint">点击录音，再点停止</div>
    <div class="analyzing" id="analyzingBar">
      <div class="dot-spinner"><span></span><span></span><span></span></div>
      <span>正在分析...</span>
    </div>
  </div>
</main>

<script>
// ===== 全局状态 =====
let audioCtx, pcmChunks, isRecording, recStart, timerId, analyser, animFrame, currentMode='record';
let emotionCounts = {}, chart = null;
let speakerRegistering = false;

const order = ['happy','sad','angry','fear','disgust','neutral'];
const icons = {happy:'😊',sad:'😢',angry:'😠',fear:'😨',disgust:'🤢',neutral:'😐'};
const colors = {happy:'#2ecc71',sad:'#3498db',angry:'#e74c3c',fear:'#f39c12',disgust:'#8e44ad',neutral:'#95a5a6'};

// ===== 初始化 =====
(async function init() {
  await refreshSpeakers();
  // 恢复 localStorage 数据
  try {
    const saved = JSON.parse(localStorage.getItem('emotion_history_v2') || '[]');
    if (saved.length) {
      saved.forEach(h => {
        emotionCounts[h.emotion] = (emotionCounts[h.emotion]||0)+1;
        replayMessage(h);
      });
      document.getElementById('emptyState')?.remove();
    }
  } catch(e) {}
  updateChart();
})();

// ===== 录音 =====
async function toggleRecord() {
  if (isRecording) { stopRecord(); } else { await startRecord(); }
}

async function startRecord() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { channelCount:1, echoCancellation:true, noiseSuppression:true }
    });
    audioCtx = new AudioContext();
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    source.connect(analyser);

    const processor = audioCtx.createScriptProcessor(2048, 1, 1);
    pcmChunks = [];
    processor.onaudioprocess = (e) => {
      if (!isRecording) return;
      pcmChunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
    };
    source.connect(processor);
    processor.connect(audioCtx.destination);

    isRecording = true; recStart = Date.now();
    document.getElementById('recBtn').classList.add('recording');
    document.getElementById('recBtn').textContent = '⏹';
    document.getElementById('recHint').textContent = '正在录音... 说完点击停止';
    document.getElementById('recTimer').classList.add('show');
    document.getElementById('waveform').classList.add('active');
    document.getElementById('spectroBox').classList.add('active');
    timerId = setInterval(updateTimer, 200);
    drawVisuals();
  } catch(e) { alert('无法访问麦克风: '+e.message); }
}

function stopRecord() {
  isRecording = false;
  clearInterval(timerId);
  if (animFrame) cancelAnimationFrame(animFrame);

  document.getElementById('recBtn').classList.remove('recording');
  document.getElementById('recBtn').textContent = '🎤';
  document.getElementById('recHint').textContent = '点击录音，再点停止';
  document.getElementById('recTimer').classList.remove('show');
  document.getElementById('waveform').classList.remove('active');
  document.getElementById('spectroBox').classList.remove('active');

  const sampleRate = audioCtx ? audioCtx.sampleRate : 16000;
  if (audioCtx) { audioCtx.close().catch(()=>{}); audioCtx = null; }

  if (!pcmChunks.length) return;
  const totalLen = pcmChunks.reduce((s,c)=>s+c.length,0);
  const audio = new Float32Array(totalLen);
  let off=0;
  pcmChunks.forEach(c=>{audio.set(c,off);off+=c.length});
  pcmChunks = [];

  sendForAnalysis(audio, sampleRate, speakerRegistering ? 'register' : 'analyze');
  speakerRegistering = false;
  document.getElementById('registerBtn').disabled = false;
}

function drawVisuals() {
  if (!isRecording || !analyser) return;

  // 波形
  const wc = document.getElementById('waveform');
  const wctx = wc.getContext('2d');
  wc.width = wc.offsetWidth * 2;
  const H = 36;
  const bufT = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(bufT);
  wctx.clearRect(0,0,wc.width,H);
  wctx.beginPath();
  wctx.strokeStyle = '#e94560'; wctx.lineWidth = 1.5;
  const slice = wc.width / bufT.length;
  for (let i=0;i<bufT.length;i++) {
    const v = bufT[i]/128-1;
    const y = (v*H*0.35)+H/2;
    i===0?wctx.moveTo(i*slice,y):wctx.lineTo(i*slice,y);
  }
  wctx.stroke();

  // 频谱图
  const sc = document.getElementById('spectroCanvas');
  const sctx = sc.getContext('2d');
  sc.width = sc.offsetWidth * 2;
  const SH = 60;
  const bufF = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(bufF);
  sctx.fillStyle = 'rgba(15,15,26,0.4)';
  sctx.fillRect(0,0,sc.width,SH);
  const barW = sc.width / bufF.length;
  for (let i=0;i<bufF.length;i++) {
    const h = (bufF[i]/255)*SH;
    const hue = (i/bufF.length)*300;
    sctx.fillStyle = `hsl(${hue},80%,55%)`;
    sctx.fillRect(i*barW, SH-h, barW-0.5, h);
  }

  animFrame = requestAnimationFrame(drawVisuals);
}

function updateTimer() {
  const s = Math.floor((Date.now()-recStart)/1000);
  document.getElementById('recTimer').textContent =
    Math.floor(s/60).toString().padStart(2,'0')+':'+(s%60).toString().padStart(2,'0');
}

// ===== 说话人注册 =====
async function registerSpeaker() {
  const name = document.getElementById('speakerName').value.trim();
  if (!name) return alert('请输入名字');
  speakerRegistering = true;
  document.getElementById('registerBtn').disabled = true;
  document.getElementById('recHint').textContent = '正在注册... 请说"我是'+name+'"后点击停止';
  await startRecord();
}

async function refreshSpeakers() {
  try {
    const resp = await fetch('/api/speaker/list');
    const data = await resp.json();
    const list = document.getElementById('speakerList');
    if (!data.speakers.length) {
      list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:12px;font-size:10px;">暂无注册说话人<br>输入名字并录音注册</div>';
      return;
    }
    list.innerHTML = data.speakers.map(s => `
      <div class="speaker-item">
        <span class="s-name">${s.icon||''} ${s.name}</span>
        <span class="s-stats">${s.total}次 · 偏向${s.dominant||'--'}</span>
        <span class="s-del" onclick="deleteSpeaker('${s.name}')">✕</span>
      </div>
    `).join('');
  } catch(e) {}
}

async function deleteSpeaker(name) {
  if (!confirm('删除说话人 '+name+' ？')) return;
  await fetch('/api/speaker/delete', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name})
  });
  refreshSpeakers();
}

// ===== 文件上传 =====
function setMode(mode) {
  currentMode = mode;
  document.getElementById('modeRecord').classList.toggle('active', mode==='record');
  document.getElementById('modeUpload').classList.toggle('active', mode==='upload');
  document.getElementById('recHint').textContent = mode==='record'?'点击录音，再点停止':'上传音频文件开始分析';
}
function handleFileSelect(e) { const f = e.target.files[0]; if(f) processUploadedFile(f); }
function handleFileDrop(e) { const f = e.dataTransfer.files[0]; if(f) processUploadedFile(f); }

async function processUploadedFile(file) {
  document.getElementById('analyzingBar').classList.add('show');
  try {
    const buf = await file.arrayBuffer();
    const actx = new OfflineAudioContext(1,1,16000);
    const ab = await actx.decodeAudioData(buf.slice(0));
    const offline = new OfflineAudioContext(1, ab.duration*16000, 16000);
    const src = offline.createBufferSource();
    src.buffer = ab; src.connect(offline.destination); src.start();
    const resampled = await offline.startRendering();
    const pcm = new Float32Array(resampled.length);
    for (let i=0;i<resampled.length;i++) pcm[i]=resampled.getChannelData(0)[i];
    sendForAnalysis(pcm, 16000, 'analyze');
  } catch(e) {
    addMessage('assistant','⚠ 文件解析失败: '+e.message,'😐','#95a5a6');
    document.getElementById('analyzingBar').classList.remove('show');
  }
}

// ===== 发送分析 =====
async function sendForAnalysis(pcm, sampleRate, type) {
  document.getElementById('analyzingBar').classList.add('show');
  document.getElementById('recBtn').disabled = true;

  const dataSize = pcm.length * 2;
  const buffer = new ArrayBuffer(44+dataSize);
  const view = new DataView(buffer);
  const w=(v,o,s)=>{for(let i=0;i<s.length;i++) view.setUint8(o+i,s.charCodeAt(i))};
  w(view,0,'RIFF');view.setUint32(4,36+dataSize,true);w(view,8,'WAVE');w(view,12,'fmt ');
  view.setUint32(16,16,true);view.setUint16(20,1,true);view.setUint16(22,1,true);
  view.setUint32(24,sampleRate,true);view.setUint32(28,sampleRate*2,true);
  view.setUint16(32,2,true);view.setUint16(34,16,true);w(view,36,'data');view.setUint32(40,dataSize,true);
  const pcm16 = new Int16Array(buffer,44);
  for(let i=0;i<pcm.length;i++) pcm16[i]=Math.max(-32768,Math.min(32767,pcm[i]*32767));

  const wavBlob = new Blob([buffer],{type:'audio/wav'});

  if (type === 'register') {
    // 编码 base64
    const reader = new FileReader();
    reader.onload = async () => {
      const b64 = reader.result.split(',')[1];
      try {
        const resp = await fetch('/api/speaker/register', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({name:document.getElementById('speakerName').value.trim(), audio:b64})
        });
        const data = await resp.json();
        if (data.ok) {
          addMessage('assistant', `✅ 说话人「${data.name}」注册成功！现在共 ${data.total} 人。说下一句话时我会认出你。`,'🔊','#2ecc71');
          refreshSpeakers();
          document.getElementById('speakerName').value = '';
        } else {
          addMessage('assistant','⚠ 注册失败: '+(data.error||'未知错误'),'😐','#95a5a6');
        }
      } finally {
        document.getElementById('analyzingBar').classList.remove('show');
        document.getElementById('recBtn').disabled = false;
      }
    };
    reader.readAsDataURL(wavBlob);
  } else {
    try {
      const resp = await fetch('/api/analyze', {
        method:'POST', headers:{'Content-Type':'audio/wav'}, body:wavBlob
      });
      const data = await resp.json();
      if (data.error) throw new Error(data.error);
      showResult(data);
    } catch(e) {
      addMessage('assistant','⚠ 分析失败: '+e.message,'😐','#95a5a6');
    } finally {
      document.getElementById('analyzingBar').classList.remove('show');
      document.getElementById('recBtn').disabled = false;
      document.getElementById('fileInput').value = '';
    }
  }
}

// ===== 显示结果 =====
function showResult(data) {
  document.getElementById('emptyState')?.remove();
  const time = new Date().toLocaleTimeString();

  let userText = data.text || '[未识别]';
  let meta = `<span class="emotion-tag" style="background:${data.color}22;color:${data.color};border:1px solid ${data.color}33">${data.icon} ${data.emotion}</span>`;
  if (data.confidence) meta += `<span class="conf-badge">${data.confidence}%</span>`;
  if (data.speaker) meta += `<span class="speaker-tag">👤 ${data.speaker} ${data.speaker_confidence||''}%</span>`;

  addMessage('user', userText, data.icon, data.color, meta);

  // 助手消息 + 情感化 TTS 按钮
  addMessage('assistant', data.response, '🤖', '#fff', '', JSON.stringify(data.tts_params||{}));

  // 更新统计
  emotionCounts[data.emotion] = (emotionCounts[data.emotion]||0)+1;
  updateChart();

  // 保存到 localStorage
  try {
    const saved = JSON.parse(localStorage.getItem('emotion_history_v2')||'[]');
    saved.push({emotion:data.emotion, text:userText, time, icon:data.icon, color:data.color, response:data.response, speaker:data.speaker});
    if (saved.length>30) saved.shift();
    localStorage.setItem('emotion_history_v2', JSON.stringify(saved));
  } catch(e) {}
}

function addMessage(role, text, icon, color, meta, ttsParams) {
  const chat = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg ' + role;

  let actions = '';
  if (role==='assistant') {
    actions = `<div class="msg-actions">
      <button class="act-btn" onclick="speakEmotional('${btoa(unescape(encodeURIComponent(text)))}','${btoa(JSON.stringify(ttsParams||{}))}')">🔊 朗读</button>
    </div>`;
  }

  div.innerHTML = `
    <div class="msg-avatar">${role==='user'?icon:'🤖'}</div>
    <div class="msg-content">
      <div>${text}</div>
      ${meta ? '<div style="margin-top:4px">'+meta+'</div>' : ''}
      ${actions}
    </div>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function replayMessage(h) {
  const chat = document.getElementById('chatArea');
  let meta = `<span class="emotion-tag" style="background:${h.color}22;color:${h.color};border:1px solid ${h.color}33">${h.icon} ${h.emotion}</span>`;
  if (h.speaker) meta += `<span class="speaker-tag">👤 ${h.speaker}</span>`;

  const u = document.createElement('div'); u.className='msg user';
  u.innerHTML = `<div class="msg-avatar">${h.icon}</div><div class="msg-content"><div>${h.text}</div><div style="margin-top:4px">${meta}</div></div>`;
  chat.appendChild(u);

  const a = document.createElement('div'); a.className='msg assistant';
  a.innerHTML = `<div class="msg-avatar">🤖</div><div class="msg-content"><div>${h.response||''}</div></div></div>`;
  chat.appendChild(a);
}

// ===== 情绪化 TTS =====
function speakEmotional(textB64, paramsB64) {
  try {
    const text = decodeURIComponent(escape(atob(textB64)));
    const params = JSON.parse(atob(paramsB64));
    if (!text || !('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN';
    u.rate = params.rate || 1.0;
    u.pitch = params.pitch || 1.0;
    u.volume = params.volume || 1.0;
    window.speechSynthesis.speak(u);
  } catch(e) {}
}

// ===== Chart.js 图表 =====
function updateChart() {
  const ctx = document.getElementById('emotionChart');
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: order.map(e=>icons[e]+' '+e),
      datasets: [{
        data: order.map(e=>emotionCounts[e]||0),
        backgroundColor: order.map(e=>colors[e]+'99'),
        borderColor: order.map(e=>colors[e]),
        borderWidth: 1, borderRadius: 3,
      }]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: { legend:{display:false} },
      scales: {
        x: { display:false },
        y: { ticks:{color:'#7777aa',font:{size:9},padding:3}, grid:{display:false} }
      }
    }
  });
}
</script>
